name: filbox
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'playlist.m3u'
  workflow_dispatch:
jobs:
  yayin:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: 📥 Depoyu klonla
      uses: actions/checkout@v4
    - name: 🐍 Python kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: 📦 FFmpeg ve font kurulumu
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-dejavu-core
    - name: 🎬 Yayın scriptini oluştur
      run: |
        cat > yayin.py << 'EOF'
        import subprocess
        import time
        import os
        import urllib.request

        # ===================== SSH101.com AYARLARI =====================
        RTMP_URL = "rtmp://ssh101.bozztv.com:1935/ssh101"
        STREAM_KEY = "fil2"
        rtmp_server = f"{RTMP_URL}/{STREAM_KEY}"

        # ===================== YAYIN AYARLARI =====================
        M3U_SOURCE = "https://raw.githubusercontent.com/ibrahirahim/yayin2/refs/heads/main/playlist.m3u"
        PLAYLIST_FILE = "playlist.m3u"
        LOGO_URL = "https://i.hizliresim.com/4ovbzg4.png"
        FONT_PATH = "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"

        print("=" * 50)
        print("📺 SSH101.com Kesintisiz Canlı Yayın")
        print("=" * 50)

        # Logo indirme
        subprocess.run(["wget", "-O", "logo.png", LOGO_URL], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)


        def m3u_listesini_getir():
            """
            Önce M3U_SOURCE'tan (GitHub raw) canlı olarak çekmeyi dener.
            Başarısız olursa yerel playlist.m3u dosyasını okur.

            ÖNEMLİ: raw.githubusercontent.com birkaç dakikalık CDN
            önbelleği kullanır. Bunu aşmak için URL'e her seferinde
            değişen bir cache-busting parametresi (?t=...) ekliyoruz.
            """
            icerik = None
            try:
                cache_buster = f"?t={int(time.time())}"
                req = urllib.request.Request(
                    M3U_SOURCE + cache_buster,
                    headers={"Cache-Control": "no-cache", "Pragma": "no-cache"}
                )
                with urllib.request.urlopen(req, timeout=15) as resp:
                    icerik = resp.read().decode('utf-8', errors='ignore')
            except Exception as e:
                print(f"⚠️ M3U web'den çekilemedi ({e}), yerel dosya deneniyor...")

            if icerik is None:
                if not os.path.exists(PLAYLIST_FILE):
                    return []
                with open(PLAYLIST_FILE, "r", encoding="utf-8") as f:
                    icerik = f.read()

            liste = []
            baslik = None
            for satir in icerik.split('\n'):
                satir = satir.strip()
                if satir.startswith('#EXTINF'):
                    if ',' in satir:
                        baslik = satir.split(',', 1)[1].strip()
                    else:
                        baslik = None
                elif satir.startswith('http'):
                    if not baslik:
                        baslik = os.path.basename(satir.split('?')[0]) or "Bilinmeyen Film"
                    liste.append({"title": baslik, "url": satir})
                    baslik = None
            return liste


        video_sayaci = 0

        while True:
            playlist = m3u_listesini_getir()

            if len(playlist) == 0:
                print("⚠️ Liste boş veya bulunamadı! 10 saniye sonra tekrar denenecek...")
                time.sleep(10)
                continue

            # Her zaman güncel listenin (dosyadaki) sırasına göre oynat.
            # video_sayaci hiç sıfırlanmaz, sürekli artar; bu sayede liste
            # her yeniden çekildiğinde o anki sıraya göre doğru video seçilir.
            secilen_idx = video_sayaci % len(playlist)
            secilen = playlist[secilen_idx]
            sonraki = playlist[(secilen_idx + 1) % len(playlist)]

            video = secilen["url"]
            baslik = secilen["title"]
            sonraki_baslik = sonraki["title"]
            video_sayaci += 1

            # Şimdi oynayan ve sıradaki filmi dosyaya yaz, ffmpeg drawtext bunu okuyacak
            try:
                with open("title.txt", "w", encoding="utf-8") as f:
                    f.write(f"Şimdi: {baslik}\nSırada: {sonraki_baslik}")
            except Exception:
                pass

            print(f"▶ Yayınlanıyor: {baslik}")
            print(f"   Kaynak: {video}")

            command = [
                'ffmpeg', '-re', '-i', video, '-i', 'logo.png',
                '-filter_complex',
                '[0:v]scale=1280:720:force_original_aspect_ratio=decrease,'
                'pad=1280:720:(ow-iw)/2:(oh-ih)/2:black[v0];'
                '[1:v]scale=-1:90[logo];'
                '[v0][logo]overlay=W-w-10:10[vlogo];'
                f'[vlogo]drawtext=fontfile={FONT_PATH}:'
                'textfile=title.txt:reload=1:'
                'fontcolor=white:fontsize=18:line_spacing=6:'
                'x=20:y=h-text_h-20[v]',
                '-map', '[v]', '-map', '0:a?', '-c:v', 'libx264', '-preset', 'veryfast',
                '-pix_fmt', 'yuv420p', '-b:v', '4000k', '-maxrate', '4000k', '-bufsize', '8000k',
                '-g', '50', '-c:a', 'aac', '-b:a', '128k', '-ar', '44100', '-f', 'flv', rtmp_server
            ]

            process = subprocess.Popen(command)
            process.wait()

            print("⏭ Video bitti. Liste yenileniyor ve sıradaki videoya geçiliyor...\n")
            time.sleep(2)
        EOF
        echo "✅ Cache-busting'li, film adı gösteren Python scripti oluşturuldu."
    - name: 📄 Playlist kontrolü
      run: |
        if [ ! -f playlist.m3u ]; then
          echo "❌ playlist.m3u bulunamadı! Boş bir tane oluşturuluyor..."
          touch playlist.m3u
        fi
        echo "✅ playlist.m3u hazır."
    - name: 🚀 Yayını başlat
      run: |
        python yayin.py
