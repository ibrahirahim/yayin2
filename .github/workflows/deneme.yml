name: SSH101.com Yayın
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'playlist.m3u'
  workflow_dispatch:
jobs:
  yayin:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: 📥 Depoyu klonla
      uses: actions/checkout@v4
    - name: 🐍 Python kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: 📦 FFmpeg ve font kurulumu
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-dejavu-core
        ffmpeg -version
    - name: 🎬 Yayın scriptini oluştur
      run: |
        cat > yayin.py << 'EOF'
        # Buraya yukarıdaki Python kodunu kopyala
        EOF
        chmod +x yayin.py
    - name: 📄 Playlist kontrolü
      run: |
        if [ ! -f playlist.m3u ]; then
          echo "⚠️ playlist.m3u bulunamadı!"
          # Örnek bir playlist oluştur
          cat > playlist.m3u << 'EOL'
        #EXTM3U
        #EXTINF:-1,Test Filmi 1
        https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4
        #EXTINF:-1,Test Filmi 2
        https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4
        EOL
        fi
        echo "✅ playlist.m3u içeriği:"
        cat playlist.m3u
    - name: 🚀 Yayını başlat
      run: |
        python -u yayin.py
      continue-on-error: false
