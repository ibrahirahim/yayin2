name: 7/24 Premium M3U8 Canlı Yayın Botu

on:
  workflow_dispatch: # Manuel başlatma butonu ekler
  schedule:
    - cron: '0 */6 * * *' # GitHub Actions limitlerine takılmamak için her 6 saatte bir otomatik yenilenir

jobs:
  broadcast:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Ortamını Hazırla
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    - name: FFmpeg ve Gerekli Sistem Paketlerini Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-dejavu-core

    - name: Python Bağımlılıklarını Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Canlı Yayını Başlat
      run: |
        # Python scriptinizin adının stream.py olduğunu varsayıyoruz
        python stream.py
